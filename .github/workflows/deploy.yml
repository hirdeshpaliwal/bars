name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ] # Change this to "master" if your default branch is master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://hirdeshpaliwal:$HF_TOKEN@huggingface.co/spaces/hirdeshpaliwal/bars main